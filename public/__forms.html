<!doctype html>
<!--
  Netlify Forms detection stub. Netlify's build bot parses static HTML to
  register forms; React-rendered forms aren't reliably detected, so this file
  declares the schema. Field names MUST stay in sync with components/ContactForm.tsx.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify form detection</title>
  </head>
  <body>
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="company" />
      <input type="text" name="subject" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
